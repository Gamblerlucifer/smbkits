name: SMBkits Instagram Email Scraper

on:
  schedule:
    - cron: '0 20 * * *'   # 매일 20:00 UTC (one_shot_scraper 후 실행)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install gspread google-auth python-dotenv playwright

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > scrapers/credentials.json

      - name: Run Instagram scraper
        run: python -u scrapers/instagram_scraper.py
        env:
          PYTHONUNBUFFERED: "1"
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          CREDS_FILE: scrapers/credentials.json
