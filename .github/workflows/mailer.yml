name: SMBkits Cold Mailer

on:
  # 현지시간 07:40~08:25 랜덤 윈도우 (automation footprint 방지)
  # 화/수/목만 발송 — 레스토랑 오너 reply율 최적 요일
  # cron = 윈도우 시작(07:40 local) 기준 UTC / mailer.py 내부에서 0~45분 추가 랜덤 슬립
  schedule:
    # JP/KR UTC+9: 07:43 local = 전날 22:43 UTC → 화(현지)=월(UTC)
    - cron: '43 22 * * 1,2,3'  # → Japan, Korea 화/수/목 | +0~45분 랜덤슬립 → 07:43~08:28
    # Taiwan UTC+8: 07:43 local = 전날 23:43 UTC
    - cron: '43 23 * * 1,2,3'  # → Taiwan 화/수/목
    # Europe CEST UTC+2: 07:43 local = 05:43 UTC 당일
    - cron: '43 5  * * 2,3,4'  # → France/Italy/Spain/Germany 화/수/목
    # UK BST UTC+1: 07:43 local = 06:43 UTC 당일
    - cron: '43 6  * * 2,3,4'  # → United Kingdom 화/수/목
    # US East EDT UTC-4: 07:43 local = 11:43 UTC 당일
    - cron: '43 11 * * 2,3,4'  # → US East 화/수/목
    # US West PDT UTC-7: 07:43 local = 14:43 UTC 당일
    - cron: '43 14 * * 2,3,4'  # → US West 화/수/목
  workflow_dispatch:
    inputs:
      week:
        description: '워밍업 주차 강제 지정 (1~6). 비워두면 캠페인 시작일 자동 계산'
        required: false
        default: ''
      countries:
        description: '발송 국가 쉼표 구분 (비워두면 전체)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run 모드 (true/false)'
        required: false
        default: 'false'

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > scrapers/credentials.json

      - name: Write .env
        run: |
          cat > scrapers/.env << 'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SHEET_ID=${{ secrets.SHEET_ID }}
          SHEET_NAME=${{ secrets.SHEET_NAME }}
          CREDS_FILE=scrapers/credentials.json
          SMTP_JAMES_PW=${{ secrets.SMTP_JAMES_PW }}
          SMTP_ALEX_PW=${{ secrets.SMTP_ALEX_PW }}
          SMTP_SARAH_PW=${{ secrets.SMTP_SARAH_PW }}
          EOF

      # schedule 트리거: UTC 시각으로 대상 국가 자동 결정
      - name: Determine target countries (schedule mode)
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(date -u +%H | sed 's/^0//')
          case $HOUR in
            22) echo "COUNTRIES=Japan,Korea"                          >> $GITHUB_ENV ;;
            23) echo "COUNTRIES=Taiwan"                               >> $GITHUB_ENV ;;
            5)  echo "COUNTRIES=France,Italy,Spain,Germany"           >> $GITHUB_ENV ;;
            6)  echo "COUNTRIES=United Kingdom"                       >> $GITHUB_ENV ;;
            11) echo "COUNTRIES=United States"                        >> $GITHUB_ENV ;;
            14) echo "COUNTRIES=United States"                        >> $GITHUB_ENV ;;
            *)  echo "COUNTRIES="                                     >> $GITHUB_ENV ;;
          esac
          echo "[Schedule] UTC hour=${HOUR} → COUNTRIES=${COUNTRIES}"

      # workflow_dispatch: 수동 입력값 사용
      - name: Set countries (dispatch mode)
        if: github.event_name == 'workflow_dispatch'
        run: echo "COUNTRIES=${{ github.event.inputs.countries }}" >> $GITHUB_ENV

      - name: Run mailer
        run: |
          ARGS=""

          # week: dispatch에서 명시한 경우만 전달 (없으면 자동 계산)
          if [ -n "${{ github.event.inputs.week }}" ]; then
            ARGS="$ARGS --week ${{ github.event.inputs.week }}"
          fi

          # countries
          if [ -n "$COUNTRIES" ]; then
            ARGS="$ARGS --countries \"$COUNTRIES\""
          fi

          # dry-run
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          eval python -u scrapers/mailer.py $ARGS
        env:
          PYTHONUNBUFFERED: "1"
