name: SMBkits Inbox Monitor

on:
  schedule:
    # 매일 오전 9시 (KST = UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > scrapers/credentials.json

      - name: Write .env
        run: |
          cat > scrapers/.env << 'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SHEET_ID=${{ secrets.SHEET_ID }}
          SHEET_NAME=${{ secrets.SHEET_NAME }}
          CREDS_FILE=scrapers/credentials.json
          SMTP_JAMES_PW=${{ secrets.SMTP_JAMES_PW }}
          SMTP_ALEX_PW=${{ secrets.SMTP_ALEX_PW }}
          SMTP_SARAH_PW=${{ secrets.SMTP_SARAH_PW }}
          EOF

      - name: Run inbox monitor
        run: python -u scrapers/inbox_monitor.py --delete
        env:
          PYTHONUNBUFFERED: "1"
